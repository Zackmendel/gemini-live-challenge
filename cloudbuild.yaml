steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_GEMINI_API_KEY=$$API_KEY \
          -t gcr.io/$PROJECT_ID/superhero-app .
    secretEnv: ['API_KEY']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/superhero-app']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'superhero-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/superhero-app'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
    env: 'API_KEY'
