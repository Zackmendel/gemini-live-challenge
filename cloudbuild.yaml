steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_GEMINI_API_KEY=$$API_KEY \
          -t europe-west1-docker.pkg.dev/$PROJECT_ID/superhero-repo/superhero-app .
    secretEnv: ['API_KEY']

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/superhero-repo/superhero-app']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'superhero-service'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/superhero-repo/superhero-app'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
    env: 'API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
